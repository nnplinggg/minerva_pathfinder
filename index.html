<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minerva Pathfinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- SCREEN: Welcome -->
  <div id="screen-welcome" class="screen active">
    <div class="screen-inner">
      <img src="assets/mi_character(final).png" class="mi-welcome" alt="Mi">
      <h1 class="pixel-title">Minerva Pathfinder</h1>
      <p class="pixel-sub">Meet Mi — your guide to Minerva's 5 schools.</p>
      <button class="btn-start-img" id="btn-start">
        <img src="assets/play-default.png" id="play-btn-img" alt="Start Adventure">
      </button>
    </div>
  </div>

  <!-- SCREEN: World Map -->
  <div id="screen-map" class="screen">

    <!-- Fixed-size pixel canvas. All nodes/chests positioned inside. -->
    <div class="pixel-map" id="pixel-map">

      <!-- 5 School chests -->
      <button class="map-node" data-school="arts-humanities"
              style="--nx:12%; --ny:18%">
        <span class="map-node__sprite"></span>
        <span class="map-node__label">Arts &amp; Humanities</span>
        <span class="map-node__stamp" id="stamp-arts-humanities"></span>
      </button>

      <button class="map-node" data-school="social-sciences"
              style="--nx:75%; --ny:15%">
        <span class="map-node__sprite"></span>
        <span class="map-node__label">Social Sciences</span>
        <span class="map-node__stamp" id="stamp-social-sciences"></span>
      </button>

      <button class="map-node" data-school="computational-sciences"
              style="--nx:78%; --ny:65%">
        <span class="map-node__sprite"></span>
        <span class="map-node__label">Computational Sciences</span>
        <span class="map-node__stamp" id="stamp-computational-sciences"></span>
      </button>

      <button class="map-node" data-school="natural-sciences"
              style="--nx:10%; --ny:65%">
        <span class="map-node__sprite"></span>
        <span class="map-node__label">Natural Sciences</span>
        <span class="map-node__stamp" id="stamp-natural-sciences"></span>
      </button>

      <button class="map-node" data-school="business"
              style="--nx:42%; --ny:40%">
        <span class="map-node__sprite"></span>
        <span class="map-node__label">Business</span>
        <span class="map-node__stamp" id="stamp-business"></span>
      </button>

      <!-- Mi mascot marker -->
      <div class="map-mi" id="map-mi"></div>

      <!-- Discovered counter HUD -->
      <div class="map-hud">
        <span class="map-hud__label">Schools found: </span>
        <span class="map-hud__count" id="hud-count">0 / 5</span>
      </div>

    </div>
  </div>

  <!-- SCREEN: Adventure -->
  <div id="screen-adventure" class="screen">
    <div class="screen-inner adventure-inner">
      <div class="adventure-nav">
        <button class="btn-nav" id="btn-adventure-back" hidden>← Back</button>
        <button class="btn-nav btn-nav--exit" id="btn-adventure-exit">✕ Map</button>
      </div>
      <img src="assets/mi_character(final).png" id="mi-diagnosis" class="mi-diagnosis" alt="Mi" hidden>
      <div class="story-box">
        <p class="story-text" id="story-text"></p>
      </div>
      <div class="choices" id="choices"></div>
    </div>
  </div>

  <!-- SCREEN: School Card -->
  <div id="screen-school-card" class="screen">
    <div class="screen-inner">
      <div class="mascot mascot--celebrate" id="mascot-card"></div>
      <div class="school-card card">
        <h2 class="school-card__name" id="card-name"></h2>
        <p class="school-card__desc" id="card-desc"></p>
        <div class="courses-title-row">
          <h3 class="school-card__courses-title">Courses you might take:</h3>
          <button class="tooltip-btn" id="tooltip-btn" aria-label="How matching works">?</button>
        </div>
        <div class="tooltip-box" id="tooltip-box" hidden>
          Courses are matched to your adventure choices. We look for courses that share at least 2 interest tags with your path through the story.
        </div>
        <ul class="course-list" id="course-list"></ul>
      </div>
      <button class="btn-pixel btn-pixel--secondary" id="btn-return-map">Back to Map</button>
    </div>
  </div>

<script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
